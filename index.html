<style>
:root{
  --sage:#8A9A5B; --sage-d:#728248; --gold:#FCD34D; --ink:#1c1917;
  --stone-50:#fafaf9; --stone-100:#f5f5f4; --stone-200:#e7e5e4; --stone-300:#d6d3d1;
  --stone-400:#a8a29e; --stone-500:#78716c; --stone-700:#44403c;
  --serif:'Playfair Display',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);line-height:1.5;background:radial-gradient(circle at 50% 0%,#4a4a4d,#2c2c2e);overflow:hidden}
.serif{font-family:var(--serif)}

/* Preview toolbar */
.previewbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;display:flex;align-items:center;gap:6px;padding:0 16px;
  background:rgba(20,20,22,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);overflow-x:auto;scrollbar-width:none}
.previewbar::-webkit-scrollbar{display:none}
.previewbar .title{font-family:var(--serif);color:#fff;letter-spacing:.16em;font-size:15px;margin-right:8px;white-space:nowrap}
.previewbar .title b{color:var(--gold)}
.seg{display:flex;gap:4px;background:rgba(255,255,255,.06);padding:4px;border-radius:12px}
.seg button{background:none;border:none;color:rgba(255,255,255,.6);font-family:var(--sans);font-size:12px;font-weight:500;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap}
.seg button.on{background:var(--sage);color:#fff}
.seg button:hover:not(.on){color:#fff}
.previewbar .spacer{flex:1}
.iconbtn{background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.7);width:36px;height:36px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iconbtn:hover{color:#fff;background:rgba(255,255,255,.12)}
.iconbtn[disabled]{opacity:.3;cursor:not-allowed}

/* Stage + device */
.stage{position:fixed;top:56px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;overflow:auto}
.scaler{transform-origin:center center}
.device{position:relative;background:#0a0a0a;border-radius:48px;padding:12px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.device[data-form="tablet"]{border-radius:34px;padding:14px}
.device[data-os="web"]{border-radius:12px;padding:0;background:#1a1a1c}
.screen{position:relative;width:100%;height:100%;background:var(--stone-50);overflow:hidden;border-radius:38px;display:flex;flex-direction:column}
.device[data-form="tablet"] .screen{border-radius:22px}
.device[data-os="web"] .screen{border-radius:0 0 12px 12px}
.osbar{height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:relative;z-index:5;font-size:13px;font-weight:600;color:#1c1917}
.device[data-form="tablet"] .osbar{height:34px;font-size:12px}
.osbar .sigs{display:flex;align-items:center;gap:5px}
.island{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:108px;height:30px;background:#000;border-radius:18px;z-index:10}
.device[data-os="android"] .island,.device[data-os="web"] .island{display:none}
.punch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:11px;height:11px;background:#000;border-radius:50%;z-index:10}
.device[data-os="ios"] .punch,.device[data-os="web"] .punch{display:none}
.homebar{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:#1c1917;opacity:.28;border-radius:3px;z-index:40}
.device[data-os="android"] .homebar{width:108px}
.device[data-os="web"] .homebar{display:none}
.webchrome{display:none}
.device[data-os="web"] .webchrome{display:flex;align-items:center;gap:10px;height:40px;background:#2a2a2c;padding:0 14px;border-radius:12px 12px 0 0;flex-shrink:0}
.webchrome .tl{display:flex;gap:7px}
.webchrome .tl i{width:12px;height:12px;border-radius:50%;display:block}
.webchrome .addr{flex:1;background:#39393b;border-radius:7px;height:24px;display:flex;align-items:center;padding:0 12px;color:#bbb;font-size:12px;gap:7px}

/* App shell */
.app{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
.appbar{height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--stone-100)}
.appbar .brand{font-family:var(--serif);letter-spacing:.18em;font-size:16px;color:#1c1917;line-height:1}
.appbar .brand b{color:var(--gold)}
/* Mobile primary-nav right cluster (cart + loyalty) */
.appbar-right{display:flex;align-items:center;gap:12px}
.appbar-cart{position:relative;background:none;border:none;color:var(--stone-500);cursor:pointer;display:flex;align-items:center;padding:0}
.navbadge{position:absolute;top:-5px;right:-7px;min-width:16px;height:16px;border-radius:999px;background:var(--sage);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:1.5px solid #fff}
.appbar-cart:hover{color:var(--ink)}
.appbar-loyalty{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--sage-d);white-space:nowrap}
.appbar-loyalty b{color:var(--ink);font-weight:700}
.appbar-loyalty .tier{text-transform:uppercase;letter-spacing:.04em;font-size:10px}
.appbar-loyalty svg{color:var(--gold)}
/* Brand + loyalty block (top nav, under logo) */
.brandblock{display:flex;flex-direction:column;justify-content:center;line-height:1.1;cursor:pointer}
.appbar .brand{cursor:pointer}
.brandloyalty{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--sage-d);letter-spacing:.02em;margin-top:3px;text-transform:uppercase}
.brandloyalty b{color:var(--ink);font-weight:700}
.brandloyalty svg{color:var(--gold)}
.device[data-os="web"] .appbar{display:none}
.applayout{flex:1;display:flex;min-height:0}
.content{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;min-height:0}
.content::-webkit-scrollbar{display:none}
.view{padding:8px 20px 110px;max-width:100%}

/* Horizontal top nav (tablet/web) */
.topnav{display:none;align-items:center;gap:6px;padding:12px 22px;border-bottom:1px solid var(--stone-200);background:#fff;flex-shrink:0}
.topnav .tn-logo{font-family:var(--serif);letter-spacing:.16em;font-size:20px;color:#1c1917;margin-right:14px;white-space:nowrap}
.topnav .tn-logo b{color:var(--gold)}
.topnav .tn-items{display:flex;align-items:center;gap:2px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
.topnav .tn-items::-webkit-scrollbar{display:none}
.topnav .tn-items button{display:flex;align-items:center;gap:7px;background:none;border:none;font-family:var(--sans);font-size:14px;font-weight:500;color:var(--stone-500);padding:9px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
.topnav .tn-items button.on{background:rgba(138,154,91,.12);color:var(--sage-d)}
.topnav .tn-items button:hover:not(.on){background:var(--stone-100)}
.topnav .tn-loc{display:flex;align-items:center;gap:6px;border:1px solid var(--stone-200);background:#fff;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--stone-700);padding:8px 12px;border-radius:999px;white-space:nowrap}
.topnav .tn-loc:hover{background:var(--stone-100)}
.topnav .tn-cta{display:flex;align-items:center;gap:7px;border:none;cursor:pointer;white-space:nowrap;font-family:var(--sans);font-size:14px;font-weight:500;color:#fff;padding:10px 16px;border-radius:10px;background:linear-gradient(135deg,var(--sage),var(--sage-d))}
.topnav .tn-right{margin-left:auto;display:flex;align-items:center;gap:8px}

/* Bottom nav (phone) */
.bottomnav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--stone-200);padding:8px 8px 22px;display:flex;justify-content:space-around;align-items:flex-end;z-index:30}
.bottomnav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;width:54px;cursor:pointer;color:var(--stone-400);font-family:var(--sans)}
.bottomnav button.on{color:var(--sage-d)}
.bottomnav button span{font-size:10px}
.bottomnav .scan{margin-top:-24px}
.bottomnav .scan .fab{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 18px rgba(114,130,72,.45);background:linear-gradient(135deg,var(--sage),var(--sage-d))}

.screen[data-form="tablet"] .topnav,.screen[data-form="desktop"] .topnav{display:flex}
.screen[data-form="tablet"] .bottomnav,.screen[data-form="desktop"] .bottomnav{display:none}
.screen[data-form="tablet"] .appbar,.screen[data-form="desktop"] .appbar{display:none}
.screen[data-form="tablet"] .view,.screen[data-form="desktop"] .view{padding:24px 32px;max-width:960px;margin:0 auto}
.screen[data-form="tablet"] .cardgrid,.screen[data-form="desktop"] .cardgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.screen[data-form="tablet"] .cardgrid>*,.screen[data-form="desktop"] .cardgrid>*{margin-bottom:0}

/* Shared UI */
.eyebrow{font-size:13px;color:var(--stone-400);margin-bottom:2px}
.h1{font-family:var(--serif);font-size:30px;line-height:1.1;color:#1c1917;margin-bottom:18px}
.h3{font-family:var(--serif);font-size:18px;color:#1c1917}
.pill{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;padding:3px 9px;border-radius:999px}
.pill.sage{background:rgba(138,154,91,.15);color:var(--sage-d)}
.pill.gold{background:#fef3c7;color:#b45309}
.pill.ink{background:var(--stone-200);color:var(--stone-500)}
.card{background:#fff;border:1px solid var(--stone-200);border-radius:18px}
.reveal{opacity:0;transform:translateY(12px)}
.reveal.in{opacity:1;transform:none;transition:opacity .5s,transform .5s}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important}}
.hero{position:relative;overflow:hidden;border-radius:24px;padding:24px;color:#fff;cursor:pointer;background:linear-gradient(135deg,#1c1917,#2a2622)}
.hero .blob{position:absolute;right:-32px;top:-32px;width:160px;height:160px;border-radius:50%;background:var(--sage);opacity:.2}
.hero .ic{width:44px;height:44px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.hero h2{font-family:var(--serif);font-size:21px;margin-bottom:4px}
.hero p{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:16px;max-width:15rem}
.hero .go{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;border-bottom:1px solid rgba(255,255,255,.3);padding-bottom:2px}
.row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--stone-100);border-radius:16px;padding:12px 16px;margin-bottom:8px}
.row .ic{width:36px;height:36px;border-radius:50%;background:rgba(138,154,91,.12);display:flex;align-items:center;justify-content:center;color:var(--sage-d);flex-shrink:0;font-size:13px;font-weight:700}
.row .step{font-size:14px;font-weight:500;color:var(--stone-700)}
.row .time{font-size:12px;color:var(--stone-400)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:500;background:var(--sage);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:var(--sans)}
.btn:active{transform:scale(.99)}
.btn.ghost{background:transparent;color:var(--stone-500)}
.btn.dark{background:var(--ink)}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.disclaimer{display:flex;gap:8px;background:var(--stone-100);border:1px solid var(--stone-200);border-radius:14px;padding:10px 12px;font-size:11px;line-height:1.4;color:var(--stone-500)}
.disclaimer.warn{background:rgba(252,211,77,.13);border-color:rgba(252,211,77,.4);color:#92710f}
.disclaimer svg{flex-shrink:0;margin-top:1px}
.bar{height:6px;border-radius:999px;background:var(--stone-100);overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;border-radius:999px}
.ring{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ring>div{width:48px;height:48px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;color:var(--stone-700)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:#fff;border:1px solid var(--stone-200);border-radius:16px;padding:16px;text-align:left;cursor:pointer;font-family:var(--sans);overflow:hidden;transition:box-shadow .2s,transform .2s,border-color .2s}
.tile:hover{box-shadow:0 10px 24px rgba(0,0,0,.08);border-color:var(--stone-300);transform:translateY(-2px)}
.tile:focus-visible{outline:2px solid var(--sage);outline-offset:-2px}
.tile p.t{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--stone-800);margin-top:10px}
.tile p.s{font-size:12px;color:var(--stone-400)}
.tile .ic{color:var(--sage-d);transition:transform .2s ease;transform-origin:left center}
.tile:hover .ic,.tile:focus-visible .ic{transform:scale(1.05)}
.flexb{display:flex;align-items:center;justify-content:space-between}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.legal{font-size:11px;line-height:1.5;color:var(--stone-400);padding:0 4px}
.legal p{margin-bottom:8px}.legal .hd{font-weight:600;color:var(--stone-500)}
.list{background:#fff;border:1px solid var(--stone-100);border-radius:16px;overflow:hidden}
.list .li{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--stone-100)}
.list .li:first-child{border-top:none}
.li span{font-size:14px;color:var(--stone-700)}

/* Loyalty card */
.loyalty{border-radius:22px;padding:20px;color:#fff;background:linear-gradient(135deg,var(--sage),var(--sage-d));position:relative;overflow:hidden}
.loyalty .lab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.75)}
.loyalty .pts{font-family:var(--serif);font-size:38px;line-height:1;margin:6px 0}
.loyalty .tier{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:999px}
.loyalty .redeem{margin-top:14px;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;border-bottom:1px solid rgba(255,255,255,.4);padding-bottom:2px;cursor:pointer}

/* Travel pill (home) */
.travelpill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--stone-200);border-radius:999px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--stone-700)}
.travelpill .uv{font-size:11px;color:var(--stone-400)}
.travelpill:hover{background:var(--stone-100)}

/* Product cards */
.prod{display:flex;gap:14px;background:#fff;border:1px solid var(--stone-100);border-radius:16px;padding:14px;margin-bottom:12px;overflow:hidden}
.prod .thumb{width:72px;height:72px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(135deg,rgba(138,154,91,.13),rgba(252,211,77,.13))}
.prod .name{font-weight:500;color:var(--stone-700);font-size:14px}
.prod .brand{font-size:12px;color:var(--stone-400);margin-bottom:6px}
.prod .meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--stone-400);margin-bottom:8px}
.prod .price{font-family:var(--serif);font-size:17px}
.save{font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;border:1px solid var(--stone-200);background:#fff;color:var(--stone-500);display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-family:var(--sans)}
.save.on{border-color:var(--sage);color:var(--sage-d)}
.prodbtns{display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:0}
.addcart{width:34px;height:30px;border-radius:8px;border:1px solid var(--stone-200);background:#fff;color:var(--sage-d);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0}
.addcart:hover{background:rgba(138,154,91,.1);border-color:var(--sage)}
.save:focus-visible,.addcart:focus-visible{outline:2px solid var(--sage);outline-offset:1px}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;border:1px solid var(--stone-200);background:#fff;color:var(--stone-500);font-size:12px;font-weight:500;padding:7px 14px;border-radius:999px;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* Food cards */
.food{background:#fff;border:1px solid var(--stone-100);border-radius:16px;padding:16px;margin-bottom:12px}
.food .top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.food .emoji{width:44px;height:44px;border-radius:50%;background:rgba(138,154,91,.12);display:flex;align-items:center;justify-content:center;font-size:20px}

/* Consult */
.expert{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--stone-100);border-radius:16px;padding:14px;margin-bottom:12px}
.expert .av{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-size:20px;background:linear-gradient(135deg,var(--sage),var(--sage-d))}
.expert .nm{font-weight:600;color:var(--stone-700);font-size:15px}
.expert .ro{font-size:12px;color:var(--sage-d);font-weight:500}
.expert .sp{font-size:12px;color:var(--stone-400)}
.expert .rate{text-align:right;flex-shrink:0}
.expert .rate b{font-family:var(--serif);font-size:16px;color:var(--stone-700)}
.expert .rate span{display:block;font-size:11px;color:var(--stone-400)}
.bookbtn{font-size:12px;font-weight:500;padding:7px 14px;border-radius:9px;border:none;background:var(--sage);color:#fff;cursor:pointer;font-family:var(--sans)}

/* Moments / rewards */
.moment{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--stone-100);border-radius:16px;padding:14px;margin-bottom:12px}
.moment .ico{width:52px;height:52px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--stone-100)}
.moment .nm{font-weight:500;color:var(--stone-700);font-size:14px}
.moment .lo{font-size:12px;color:var(--stone-400)}
.moment .cost{font-family:var(--serif);font-size:15px;color:var(--sage-d)}
.redeembtn{font-size:12px;font-weight:500;padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-family:var(--sans);background:var(--ink);color:#fff;white-space:nowrap}
.redeembtn[disabled]{background:var(--stone-200);color:var(--stone-400);cursor:not-allowed}

/* Tiers */
.tier-card{border:1.5px solid var(--stone-200);border-radius:16px;padding:16px;margin-bottom:12px}
.tier-card.cur{border-color:var(--sage);background:rgba(138,154,91,.05)}
.tier-card .tn{font-family:var(--serif);font-size:18px;color:var(--stone-800)}
.tier-card .tp{font-size:13px;color:var(--stone-400);margin-bottom:10px}
.tier-card .tp b{font-family:var(--serif);font-size:20px;color:var(--stone-700)}
.tier-card .ben{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--stone-500);margin-bottom:5px}
.tier-card .ben svg{color:var(--sage-d);flex-shrink:0}
.upbtn{margin-top:10px;width:100%;padding:10px;border:none;border-radius:10px;background:var(--ink);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans)}

/* Wallet */
.wcard{border-radius:14px;padding:14px 16px;margin-bottom:10px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.wcard.visa{background:linear-gradient(135deg,#1a1a2e,#3a3a5e)}
.wcard.apple{background:linear-gradient(135deg,#333,#555)}
.wcard .wt{font-size:13px;font-weight:600}
.wcard .wn{font-size:12px;opacity:.7;font-family:monospace;letter-spacing:1px}
.voucher{display:flex;align-items:center;gap:12px;background:#fff;border:1px dashed var(--stone-300);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.voucher .vic{width:38px;height:38px;border-radius:9px;background:rgba(252,211,77,.18);color:#b45309;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.voucher .vt{font-size:14px;font-weight:600;color:var(--stone-700)}
.voucher .vx{font-size:11px;color:var(--stone-400)}
.voucher .vv{margin-left:auto;font-family:var(--serif);font-size:15px;color:var(--sage-d)}

/* Profile bio grid */
.biogrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.biocell{background:#fff;border:1px solid var(--stone-100);border-radius:12px;padding:12px 14px}
.biocell .bk{font-size:11px;color:var(--stone-400);text-transform:uppercase;letter-spacing:.05em}
.biocell .bv{font-size:14px;font-weight:500;color:var(--stone-700);margin-top:2px}
/* Editable profile sections */
.editlink{background:none;border:none;color:var(--sage-d);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);padding:0}
.editlink.mute{color:var(--stone-400)}
.editlink:hover{color:var(--sage)}
.editactions{display:flex;gap:16px}
.editform{display:flex;flex-direction:column;gap:10px}
.editgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.editrow label{display:block;font-size:11px;color:var(--stone-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.editfield{width:100%;border:1px solid var(--stone-200);border-radius:10px;padding:9px 12px;font-size:14px;font-family:var(--sans);color:var(--ink);background:#fff;outline:none}
.editfield:focus{border-color:var(--sage)}
.editfield::placeholder{color:var(--stone-300)}

/* Achievements */
.achgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ach{background:#fff;border:1px solid var(--stone-200);border-radius:14px;padding:14px;text-align:left}
.ach.unlocked{background:rgba(138,154,91,.1);border-color:rgba(138,154,91,.3)}
.ach.locked{opacity:.55}
.ach .achtop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ach .achtop svg{color:var(--sage-d)}
.ach.locked .achtop svg{color:var(--stone-400)}
.ach .achpts{font-size:11px;font-weight:700;color:var(--sage-d)}
.ach .at{font-size:13px;font-weight:600;color:var(--stone-800);margin-bottom:2px}
.ach .ad{font-size:11px;color:var(--stone-400)}

/* Progress journey */
.journeybanner{display:flex;align-items:center;justify-content:space-between;color:#fff;border-radius:18px;padding:16px;cursor:pointer;background:linear-gradient(135deg,#1c1917,#2a2622)}
.journeybanner .jb-l{display:flex;align-items:center;gap:12px}
.journeybanner .jb-ic{width:40px;height:40px;border-radius:50%;background:rgba(252,211,77,.2);color:var(--gold);display:flex;align-items:center;justify-content:center}
.journeybanner .jb-day{font-weight:600;font-size:14px}
.journeybanner .jb-sub{font-size:12px;color:rgba(255,255,255,.6)}
.streakflame{display:flex;align-items:center;gap:6px;background:rgba(252,211,77,.18);color:#92710f;font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;white-space:nowrap}
.beforeafter{display:flex;align-items:center;gap:10px}
.snap{flex:1;text-align:center}
.snapface{height:90px;border-radius:14px;margin-bottom:10px;position:relative;overflow:hidden}
.snapface.s0{background:radial-gradient(circle at 50% 38%,#cbb89a,#9c8b73)}
.snapface.s1{background:radial-gradient(circle at 50% 38%,#ecdcab,#b9a86a)}
.snapface::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 32%,rgba(255,255,255,.35),transparent 62%)}
.snapface.s1::after{background:radial-gradient(circle at 50% 28%,rgba(255,255,255,.6),transparent 66%)}
.snapscore{font-family:var(--serif);font-size:24px;color:var(--stone-700)}
.snapscore.now{color:var(--sage-d)}
.snap p{font-size:12px;color:var(--stone-400);margin-top:2px}
.snaparrow{color:var(--sage);flex-shrink:0}
.streakgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.streakgrid .dot{aspect-ratio:1;border-radius:4px;background:var(--stone-200)}
.streakgrid .dot.on{background:var(--sage)}

/* Auth / membership */
.signout{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--stone-200);color:var(--stone-500);font-family:var(--sans);font-size:12px;font-weight:500;padding:7px 12px;border-radius:9px;cursor:pointer;white-space:nowrap}
.signout:hover{background:var(--stone-100)}
.member{border-radius:24px;padding:20px;color:#fff;background:linear-gradient(135deg,#3a3a3c,#1c1917)}
.member .lab{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.7)}
.authwrap{padding-top:18px;max-width:360px;margin:0 auto}
.authlogo{font-family:var(--serif);letter-spacing:.18em;font-size:26px;text-align:center;color:#1c1917;margin-bottom:18px}
.authlogo b{color:var(--gold)}
.authh{font-size:26px;text-align:center;margin-bottom:8px}
.authsub{font-size:14px;color:var(--stone-500);text-align:center;margin-bottom:22px;line-height:1.5}
.authfield{margin-bottom:12px}
.authfield label{display:block;font-size:12px;font-weight:500;color:var(--stone-500);margin-bottom:6px}
.authfield input{width:100%;border:1px solid var(--stone-200);border-radius:11px;padding:12px 14px;font-size:14px;font-family:var(--sans);outline:none}
.authfield input:focus{border-color:var(--sage)}
.author{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--stone-400);font-size:12px}
.author::before,.author::after{content:"";flex:1;height:1px;background:var(--stone-200)}
.authsocial{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--stone-200);background:#fff;border-radius:11px;padding:12px;font-size:14px;font-weight:500;color:var(--stone-700);cursor:pointer;font-family:var(--sans);margin-bottom:10px}
.authsocial:hover{background:var(--stone-100)}
.authsocial .prov{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.authsocial .prov-g{background:#fff;border:1px solid var(--stone-200);color:#4285F4;font-weight:700;font-size:12px}
.authalt{text-align:center;font-size:13px;color:var(--stone-500);margin:14px 0}
.authalt b{color:var(--sage-d);cursor:pointer}
.authnote{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--stone-400);margin-top:14px}
.lockcard{background:#fff;border:1px solid var(--stone-200);border-radius:18px;padding:32px 24px;text-align:center;margin-top:8px}
.lockic{width:60px;height:60px;border-radius:50%;background:rgba(138,154,91,.12);color:var(--sage-d);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.lockmsg{font-size:14px;color:var(--stone-500);line-height:1.55;margin-bottom:20px}

/* Scan overlay + sheets */
.overlay{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:0 32px}
.scanbox{position:relative;width:240px;height:240px;border-radius:28px;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:28px}
.scanline{position:absolute;left:0;right:0;height:2px;background:var(--sage);box-shadow:0 0 16px var(--sage);animation:scan 2.2s ease-in-out infinite alternate}
@keyframes scan{from{top:8%}to{top:92%}}
.scan-eyebrow{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--sage);margin-bottom:18px}
/* Face ID–style segmented capture circle */
.faceid{position:relative;width:210px;height:210px;margin-bottom:20px;display:flex;align-items:center;justify-content:center}
.fid-svg{position:absolute;inset:0;width:100%;height:100%}
.fid-svg line{stroke:rgba(255,255,255,.18);stroke-width:3;stroke-linecap:round;transition:stroke .25s}
.fid-svg line.on{stroke:#0a84ff}
.faceid-core{width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7)}
.faceid-dots{display:flex;gap:8px;margin-top:6px}
.faceid-dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .2s,transform .2s}
.faceid-dots i.cur{background:#0a84ff;transform:scale(1.35)}
.faceid-dots i.done{background:#0a84ff}
.overlay-x{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.overlay-x:hover{background:rgba(255,255,255,.2)}
.scan-single{margin-top:20px;background:none;border:1px solid rgba(255,255,255,.28);color:#fff;font-family:var(--sans);font-size:13px;font-weight:500;padding:9px 18px;border-radius:999px;cursor:pointer}
.scan-single:hover{background:rgba(255,255,255,.1)}
.overlay h3{font-family:var(--serif);font-size:24px;margin-bottom:8px;text-align:center}
.scanprog{width:240px;height:6px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden}
.scanprog>i{display:block;height:100%;width:0;background:var(--sage);border-radius:999px;transition:width .12s linear}
.overlay .sub{font-size:12px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:6px}
@media(prefers-reduced-motion:reduce){.scanline{animation:none;top:50%}}
.sheet-bg{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.4);display:flex;align-items:flex-end}
.sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:24px;animation:up .35s ease both;max-height:80%;overflow-y:auto;scrollbar-width:none}
.sheet::-webkit-scrollbar{display:none}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet .grab{width:40px;height:4px;background:var(--stone-200);border-radius:999px;margin:0 auto 16px}
.sheet .ic{width:48px;height:48px;border-radius:50%;background:rgba(138,154,91,.12);display:flex;align-items:center;justify-content:center;color:var(--sage-d);margin-bottom:12px}
.sheet h3{font-family:var(--serif);font-size:20px;margin-bottom:8px}
.sheet p{font-size:14px;color:var(--stone-500);margin-bottom:12px}
.sheet p.fine{font-size:12px;color:var(--stone-400);margin-bottom:20px}
.locrow{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;border-top:1px solid var(--stone-100);cursor:pointer}
.locrow:first-of-type{border-top:none}
.locrow.on{color:var(--sage-d)}
.locrow .ln{font-size:15px;font-weight:500;color:var(--stone-700)}
.locrow.on .ln{color:var(--sage-d)}
.locrow .lc{font-size:12px;color:var(--stone-400)}

/* Chat assistant */
.chat-fab{position:absolute;bottom:84px;right:18px;width:54px;height:54px;border-radius:50%;z-index:45;border:none;cursor:pointer;background:linear-gradient(135deg,var(--sage),var(--sage-d));color:#fff;box-shadow:0 8px 22px rgba(114,130,72,.5);display:flex;align-items:center;justify-content:center}
.screen[data-form="tablet"] .chat-fab,.screen[data-form="desktop"] .chat-fab{bottom:24px;right:24px}
.chat-fab .badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;background:var(--gold);color:#1c1917;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.chat-panel{position:absolute;z-index:70;background:#fff;display:none;flex-direction:column;overflow:hidden;bottom:0;left:0;right:0;height:86%;border-radius:24px 24px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
.chat-panel.open{display:flex;animation:up .3s ease both}
.screen[data-form="tablet"] .chat-panel,.screen[data-form="desktop"] .chat-panel{left:auto;right:24px;bottom:24px;width:380px;height:560px;border-radius:20px}
.chat-head{background:linear-gradient(135deg,var(--sage),var(--sage-d));color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-head .av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center}
.chat-head .nm{font-weight:600;font-size:15px}
.chat-head .st{font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:5px}
.chat-head .st i{width:7px;height:7px;border-radius:50%;background:#86efac;display:block}
.chat-head .x{margin-left:auto;background:none;border:none;color:#fff;cursor:pointer;opacity:.8}
.chat-body{flex:1;overflow-y:auto;padding:16px;background:var(--stone-100);scrollbar-width:none;display:flex;flex-direction:column;gap:10px}
.chat-body::-webkit-scrollbar{display:none}
.msg{max-width:80%;padding:10px 13px;border-radius:16px;font-size:13.5px;line-height:1.45;white-space:pre-wrap}
.msg.bot{background:#fff;color:var(--stone-700);border:1px solid var(--stone-200);align-self:flex-start;border-bottom-left-radius:5px}
.msg.user{background:var(--sage);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.msg.sys{align-self:center;background:rgba(252,211,77,.18);color:#92710f;font-size:11px;text-align:center;max-width:92%}
.typing{align-self:flex-start;background:#fff;border:1px solid var(--stone-200);padding:12px 14px;border-radius:16px;display:flex;gap:4px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--stone-400);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.cchips{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 10px;background:var(--stone-100)}
.cchip{background:#fff;border:1px solid var(--sage);color:var(--sage-d);font-size:12px;font-weight:500;padding:7px 12px;border-radius:999px;cursor:pointer;font-family:var(--sans)}
.cchip:hover{background:rgba(138,154,91,.1)}
.chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--stone-200);background:#fff;flex-shrink:0}
.chat-input input{flex:1;border:1px solid var(--stone-200);border-radius:999px;padding:11px 16px;font-size:14px;font-family:var(--sans);outline:none}
.chat-input input:focus{border-color:var(--sage)}
.chat-input button{width:42px;height:42px;border-radius:50%;border:none;background:var(--sage);color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chat-disc{font-size:10px;color:var(--stone-400);text-align:center;padding:6px 12px;background:#fff}

/* Home quick-action CTAs */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid3 .tile{padding:14px 12px}
.grid3 .tile p.t{font-size:13px}

/* Account tab bar */
.acctabbar{display:flex;background:var(--stone-100);padding:4px;border-radius:12px;margin:16px 0}
.acctab{flex:1;border:none;background:none;font-family:var(--sans);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--stone-400);padding:9px 4px;border-radius:9px;cursor:pointer}
.acctab.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.acctab:hover:not(.on){color:var(--stone-600)}

/* Settings rows + toggles */
.setrow{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--stone-100);border-radius:14px;padding:13px 16px;margin-bottom:8px}
.setrow span{font-size:14px;color:var(--stone-700)}
.tggl{width:44px;height:26px;border-radius:999px;background:var(--stone-300);position:relative;border:none;cursor:pointer;flex-shrink:0;transition:background .2s}
.tggl::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.tggl.on{background:var(--sage)}
.tggl.on::after{left:21px}

/* Loyalty member stats (LHW-style) */
.member .bignum{font-family:var(--serif);font-size:42px;line-height:1;margin:2px 0}
.member .biglab{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.7)}
.memberstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.2)}
.memberstats .statcol{text-align:center}
.memberstats .statcol b{font-family:var(--serif);font-size:26px;display:flex;align-items:center;justify-content:center;gap:5px}
.memberstats .statcol b svg{color:var(--gold)}
.memberstats .statcol span{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.7);margin-top:3px;display:block}

/* Wallet (LHW-style) */
.paycard{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--stone-100);border-radius:14px;padding:13px 16px;margin-bottom:10px}
.paycard .payleft{display:flex;align-items:center;gap:12px}
.paycard .payic{width:40px;height:40px;border-radius:9px;background:var(--stone-100);color:var(--stone-500);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.paycard .payname{font-size:14px;font-weight:500;color:var(--stone-800)}
.paycard .payexp{font-size:11px;color:var(--stone-400)}
.paycard .paydefault{font-size:10px;text-transform:uppercase;font-weight:700;letter-spacing:.05em;background:var(--stone-100);color:var(--stone-500);padding:4px 9px;border-radius:999px}
.giftcard{border-radius:16px;padding:18px;margin-bottom:10px;color:#fff;background:linear-gradient(135deg,#44403c,#1c1917)}
.giftcard .giftlab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.7)}
.giftcard .giftval{font-family:var(--serif);font-size:26px;margin-top:2px}
.giftcard .giftfoot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}

  function lineChart(series,id){
    var w=320,h=84,pad=6,maxD=series[series.length-1].d||1;
    function X(d){return pad+(d/maxD)*(w-2*pad);} function Y(v){return h-pad-(v/100)*(h-2*pad);}
    var p=series.map(function(s,i){return (i?'L':'M')+X(s.d).toFixed(1)+' '+Y(s.v).toFixed(1);}).join(' ');
    var area=p+' L'+X(maxD).toFixed(1)+' '+(h-pad)+' L'+X(0).toFixed(1)+' '+(h-pad)+' Z';
    var last=series[series.length-1];
    return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block"><defs><linearGradient id="lg'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8A9A5B" stop-opacity=".22"/><stop offset="1" stop-color="#8A9A5B" stop-opacity="0"/></linearGradient></defs><path d="'+area+'" fill="url(#lg'+id+')"/><path d="'+p+'" fill="none" stroke="#728248" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+X(maxD).toFixed(1)+'" cy="'+Y(last.v).toFixed(1)+'" r="4" fill="#728248"/></svg>';
  }

    var PER=1400, SETTLE=1200, N=48;
    var ticks='';
    for(var ti=0; ti<N; ti++){ var a=(ti/N)*6.2831853-1.5707963, x1=(60+46*Math.cos(a)).toFixed(1), y1=(60+46*Math.sin(a)).toFixed(1), x2=(60+54*Math.cos(a)).toFixed(1), y2=(60+54*Math.sin(a)).toFixed(1); ticks+='<line id="ft'+ti+'" x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/>'; }
    var ov=document.createElement('div'); ov.className='overlay'; ov.id='overlay';
    ov.innerHTML='<button class="overlay-x" data-act="closeScan" aria-label="Close scan">'+icon('close',20)+'</button>'+
      '<p class="scan-eyebrow">'+icon('activity',13)+' AI Dermatology Engine</p>'+
      '<div class="faceid"><svg class="fid-svg" viewBox="0 0 120 120" aria-hidden="true">'+ticks+'</svg><div class="faceid-core">'+icon('user',46)+'</div></div>'+
      '<h3 id="scanStage">'+angles[0].label+'</h3>'+
      '<div class="faceid-dots" id="fidDots">'+angles.map(function(a,i){return '<i class="'+(i===0?'cur':'')+'"></i>';}).join('')+'</div>'+
      '<p class="sub" style="margin-top:14px">'+icon('shield',12)+' Clinical-grade • on-device • <span id="scanPct">0%</span></p>'+
      '<button class="scan-single" data-act="scanSingle">Continue with a single angle</button>';
    app.appendChild(ov);
    var ring=null, stepTimer=null, safety=null, finished=false, idx=0;
    function setProgress(p){ var k=Math.round(p/100*N); for(var i=0;i<N;i++){ var el=document.getElementById('ft'+i); if(el) el.setAttribute('class', i<k?'on':''); } var pl=document.getElementById('scanPct'); if(pl) pl.textContent=Math.round(p)+'%'; }
    function cleanup(){ if(ring){clearInterval(ring);ring=null;} if(stepTimer){clearTimeout(stepTimer);stepTimer=null;} if(safety){clearTimeout(safety);safety=null;} var o=document.getElementById('overlay'); if(o)o.remove(); activeScan=null; }
    // Guaranteed redirect — re-render directly (go() no-ops when already on consult, e.g. scanning from the Results tab)
    function finish(){ if(finished)return; finished=true; cleanup(); state.scanComplete=true; state.consultTab='results'; state.bodyArea='all'; state.view='consult'; track('scan_completed',{score:DATA.analysis.score,accuracy:DATA.bodyScan.accuracy}); renderContent(); }
    function cancel(){ if(finished)return; finished=true; cleanup(); track('scan_cancelled'); } // close X: back to the site, no redirect
    function single(){ if(finished)return; if(stepTimer){clearTimeout(stepTimer);stepTimer=null;} if(ring){clearInterval(ring);ring=null;} track('scan_single_angle'); var st=document.getElementById('scanStage'); if(st)st.textContent='Compiling your diagnostic summary…'; setProgress(100); var dots=document.getElementById('fidDots'); if(dots){var ds=dots.querySelectorAll('i'); if(ds.forEach)ds.forEach(function(d){d.className='done';});} safety=setTimeout(finish,900); }
    activeScan={finish:finish,cancel:cancel,single:single};
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(reduce){ setProgress(100); safety=setTimeout(finish,700); return; }
    var capture=angles.length*PER, elapsed=0;
    ring=setInterval(function(){ elapsed+=80; setProgress(Math.min(100,elapsed/capture*100)); if(elapsed>=capture){ clearInterval(ring); ring=null; } },80);
    safety=setTimeout(finish, capture+SETTLE+900); // hard safety: always redirect even if a step errors
    (function step(){
      var dots=document.getElementById('fidDots'), ds=dots?dots.querySelectorAll('i'):[];
      if(idx>=angles.length){ var st=document.getElementById('scanStage'); if(st)st.textContent='Compiling your diagnostic summary…'; if(ds.forEach)ds.forEach(function(d){d.className='done';}); stepTimer=setTimeout(finish,SETTLE); return; }
      var st2=document.getElementById('scanStage'); if(st2)st2.textContent=angles[idx].label;
      if(ds.forEach)ds.forEach(function(d,j){ d.className=j<idx?'done':(j===idx?'cur':''); });
      idx++; stepTimer=setTimeout(step,PER);
    })();
  }

  /* ---------------- Chat assistant ---------------- */
  var chat={open:false,msgs:[],awaiting:null,ticketSeq:1042};
  function buildChatPanel(){
    return '<div class="chat-panel" id="chatPanel"><div class="chat-head"><div class="av">'+icon('sparkles',18)+'</div><div><div class="nm">AURA Assistant</div><div class="st"><i></i> Online · replies instantly</div></div><button class="x" data-act="closeChat">'+icon('arrow',18)+'</button></div><div class="chat-body" id="chatBody"></div><div class="cchips" id="chatChips"></div><div class="chat-input"><input id="chatInput" placeholder="Ask anything…" autocomplete="off"><button data-act="sendChat" aria-label="Send">'+icon('send',18)+'</button></div><div class="chat-disc">AI assistant — can make mistakes. Not medical advice; consult a professional for health concerns.</div></div>';
  }
  function openChat(){
    chat.open=true; var p=document.getElementById('chatPanel'); if(p)p.classList.add('open');
    var fab=document.querySelector('.chat-fab'); if(fab)fab.style.display='none';
    if(chat.msgs.length===0){ botSay("Hi, I'm your AURA Assistant 🌿 I can help with skincare, booking a consult, your rewards, Travel Mode, or your membership. What do you need?"); setChips(["Skincare question","Book a consult","My rewards","Membership"]); } else { renderChat(); }
    track('chat_opened');
  }
  function closeChat(){ chat.open=false; var p=document.getElementById('chatPanel'); if(p)p.classList.remove('open'); var fab=document.querySelector('.chat-fab'); if(fab)fab.style.display='flex'; }
  function renderChat(){ var b=document.getElementById('chatBody'); if(!b)return; b.innerHTML=chat.msgs.map(function(m){return '<div class="msg '+m.role+'">'+escapeHtml(m.text)+'</div>';}).join(''); b.scrollTop=b.scrollHeight; }
  function setChips(arr){ var c=document.getElementById('chatChips'); if(!c)return; c.innerHTML=(arr||[]).map(function(t){return '<button class="cchip" data-cchip="'+escapeHtml(t)+'">'+escapeHtml(t)+'</button>';}).join(''); }
  function botSay(t){ chat.msgs.push({role:'bot',text:t}); renderChat(); }
  function userSay(t){ chat.msgs.push({role:'user',text:t}); renderChat(); }
  function sysSay(t){ chat.msgs.push({role:'sys',text:t}); renderChat(); }
  function showTyping(){ var b=document.getElementById('chatBody'); if(!b)return; var t=document.createElement('div'); t.className='typing'; t.id='typing'; t.innerHTML='<i></i><i></i><i></i>'; b.appendChild(t); b.scrollTop=b.scrollHeight; }
  function hideTyping(){ var t=document.getElementById('typing'); if(t)t.remove(); }
  function sendChat(text){
    text=(text||'').trim(); if(!text)return; userSay(text); var inp=document.getElementById('chatInput'); if(inp)inp.value=''; setChips([]); showTyping(); track('chat_message_sent');
    // PROD: replace with fetch('/api/assistant', {credentials:'same-origin', body:{message,history}}) → backend proxies Claude/OpenAI with key SERVER-SIDE
    setTimeout(function(){ hideTyping(); agentRespond(text); }, 600+Math.random()*400);
  }
  function agentRespond(text){
    var t=text.toLowerCase();
    if(chat.awaiting==='ticket_desc'){ chat.awaiting=null; var id='AURA-'+(chat.ticketSeq++); sysSay('🎫 Ticket '+id+' created'); botSay("Thanks — I've logged that for our team.\nTicket "+id+" · Status: Open\nWe'll email an update within 24 hours. Anything else?"); setChips(["Book a consult","My rewards","No, thanks"]); track('support_ticket_created',{ticketId:id}); return; }
    if(/^(hi|hey|hello|yo|good (morning|afternoon|evening))/.test(t)){ botSay("Hi there! 🌿 How can I help — skincare, a consult, rewards, Travel Mode, or membership?"); setChips(["Skincare question","Book a consult","My rewards","Membership"]); return; }
    if(/(diagnos|disease|rash|eczema|melanoma|infect|rosacea|prescri|medical condition)/.test(t)){ botSay("I want to be careful here — AURA gives cosmetic wellness guidance, not medical advice, so I can't diagnose or treat conditions. The best path is a telehealth consult with our dermatologist. Want me to open booking?"); setChips(["Book a consult","No, thanks"]); return; }
    if(/(consult|derm|doctor|dietitian|expert|appointment|book|telehealth)/.test(t)){ botSay("Of course. We have Dr. Alisha S. (Dermatologist), Sarah Jenkins (Holistic Dietitian), and 24/7 AI triage. Prestige members get complimentary visits. Open the Consult page to book?"); setChips(["Go to Consult","Membership","No, thanks"]); return; }
    if(/(point|reward|redeem|moment|experience|loyal)/.test(t)){ botSay("You have "+state.points.toLocaleString()+" points 🌟 redeemable for curated experiences like a spa day or a Michelin dinner. Want to see what you can redeem?"); setChips(["Go to Moments","Membership","No, thanks"]); return; }
    if(/(travel|trip|location|aspen|tulum|london|climate|uv)/.test(t)){ botSay("Travel Mode adapts your routine to your destination's climate — UV, dryness, pollution, and more. You're currently set to "+DATA.locations[state.location].name+". Want to change location?"); setChips(["Change location","No, thanks"]); return; }
    if(/(price|cost|plan|member|subscri|upgrade|tier|prestige|elevate|discovery)/.test(t)){ botSay("AURA has three tiers: Discovery ($49), Elevate ($129), and Prestige ($299). Prestige adds concierge access, free telehealth, and early access. Manage it on your account page — want to go there?"); setChips(["Go to membership","No, thanks"]); return; }
    if(/(skin|product|routine|dry|oily|acne|spf|serum|recommend|hydrat|shop|buy)/.test(t)){ botSay("Happy to help! Start with a Vision scan so I can match products to your skin, or browse The Shop. Your top focus is hydration right now. Scan or shop?"); setChips(["Start my scan","Go to shop","Go to Consult"]); return; }
    if(/(problem|issue|bug|broken|refund|cancel|complain|wrong|charge|help)/.test(t)){ botSay("Sorry about that. Tell me what's happening in a sentence and I'll open a support ticket."); chat.awaiting='ticket_desc'; return; }
    if(/(thank|thanks|thx|ty)/.test(t)){ botSay("Anytime! 🌿"); setChips(["Book a consult","My rewards"]); return; }
    if(/(no|nope|nothing|bye|that.?s all)/.test(t)){ botSay("I'll be right here if anything comes up. Take care! 🌿"); setChips([]); return; }
    botSay("I can help with skincare & products, booking a telehealth consult, your rewards & points, Travel Mode, or your membership. Which is closest?"); setChips(["Skincare question","Book a consult","My rewards","Membership"]);
  }
  function handleChip(label){
    var l=label.toLowerCase();
    if(l==='go to consult'||l==='book a consult'){ closeChat(); go('consult'); return; }
    if(l==='go to moments'||l==='my rewards'){ closeChat(); go('moments'); return; }
    if(l==='go to shop'){ closeChat(); go('shop'); return; }
    if(l==='go to membership'||l==='membership'){ closeChat(); go('account'); return; }
    if(l==='change location'){ closeChat(); travelSheet(); return; }
    if(l==='start my scan'){ closeChat(); consentSheet(); return; }
    sendChat(label);
  }
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

  /* ---------------- Toolbar + events ---------------- */
  function buildToolbar(){ document.getElementById('deviceSeg').innerHTML=Object.keys(DEVICES).map(function(k){return '<button data-device="'+k+'" class="'+(k===currentDevice?'on':'')+'">'+DEVICES[k].label+'</button>';}).join(''); }
  function selectDevice(k){ currentDevice=k; buildToolbar(); buildDevice(); track('device_changed',{device:k}); }

  document.addEventListener('click', function(e){
    var t=e.target.closest('[data-device],[data-nav],[data-act],[data-save],[data-cart],[data-uncart],[data-cchip],[data-fchip],[data-loc],[data-book],[data-confirmbook],[data-redeem],[data-tier],[data-acctab],[data-consulttab],[data-bodyarea],[data-areaexp],[data-toggle],[data-step],[data-rstep],[data-rmove],[data-rdel],[data-radd],[data-rfilter],#rotateBtn');
    if(!t) return;
    if(t.id==='rotateBtn'){ landscape=!landscape; buildDevice(); return; }
    if(t.dataset.device){ selectDevice(t.dataset.device); return; }
    if(t.hasAttribute('data-toggle')){ t.classList.toggle('on'); return; }
    if(t.hasAttribute('data-step')){ var k=t.dataset.step, ix=state.doneSteps.indexOf(k), st=t.closest('.rh-step'); if(ix>-1){ state.doneSteps.splice(ix,1); t.classList.remove('on'); t.innerHTML=''; if(st)st.classList.remove('done'); } else { state.doneSteps.push(k); t.classList.add('on'); t.innerHTML=icon('check',15); if(st)st.classList.add('done'); } track('ritual_step_toggled',{step:k}); return; }
    if(t.hasAttribute('data-rstep')){ var rk=t.dataset.rstep, ex=state.expandedSteps.indexOf(rk), it=t.closest('.rh-item'); if(ex>-1){ state.expandedSteps.splice(ex,1); if(it)it.classList.remove('open'); t.setAttribute('aria-expanded','false'); } else { state.expandedSteps.push(rk); if(it)it.classList.add('open'); t.setAttribute('aria-expanded','true'); } track('ritual_step_expanded',{step:rk}); return; }
    if(t.dataset.rmove){ var mp=t.dataset.rmove.split(':'), mi=parseInt(mp[0],10), md=mp[1], arr=state.ritualDraft; if(arr){ var mj=md==='up'?mi-1:mi+1; if(mj>=0&&mj<arr.length){ var tmp=arr[mi]; arr[mi]=arr[mj]; arr[mj]=tmp; } } renderContent(); return; }
    if(t.dataset.rdel){ if(state.ritualDraft) state.ritualDraft.splice(parseInt(t.dataset.rdel,10),1); track('ritual_step_removed'); renderContent(); return; }
    if(t.dataset.radd){ var li=RITUAL_LIBRARY[parseInt(t.dataset.radd,10)]; if(li&&state.ritualDraft) state.ritualDraft.push({name:li.name,time:li.time,how:li.how,type:li.type}); track('ritual_step_added'); renderContent(); return; }
    if(t.dataset.rfilter){ state.ritualFilter=t.dataset.rfilter; renderContent(); return; }
    if(t.dataset.acctab){ state.accountTab=t.dataset.acctab; renderContent(); return; }
    if(t.dataset.consulttab){ state.consultTab=t.dataset.consulttab; renderContent(); return; }
    if(t.hasAttribute('data-areaexp')){ var ak=t.dataset.areaexp, aix=state.expandedAreas.indexOf(ak), ac=t.closest('.acc'); if(aix>-1){ state.expandedAreas.splice(aix,1); if(ac)ac.classList.remove('open'); t.setAttribute('aria-expanded','false'); } else { state.expandedAreas.push(ak); if(ac)ac.classList.add('open'); t.setAttribute('aria-expanded','true'); } track('result_area_toggled',{area:ak}); return; }
    if(t.dataset.bodyarea){ var bav=t.dataset.bodyarea; state.bodyArea=bav; if(bav!=='all'&&state.expandedAreas.indexOf(bav)<0) state.expandedAreas.push(bav); track('body_area_selected',{area:bav}); renderContent(); return; }
    if(t.dataset.nav){ if(t.dataset.tab) state.accountTab=t.dataset.tab; if(t.dataset.ctab) state.consultTab=t.dataset.ctab; go(t.dataset.nav); return; }
    if(t.dataset.cchip){ handleChip(t.dataset.cchip); return; }
    if(t.dataset.fchip){ shopFilter=t.dataset.fchip; renderContent(); return; }
    if(t.dataset.loc){ setLocation(t.dataset.loc); return; }
    if(t.dataset.book){ bookConsult(parseInt(t.dataset.book,10)); return; }
    if(t.dataset.confirmbook){ confirmBook(parseInt(t.dataset.confirmbook,10)); return; }
    if(t.dataset.redeem){ redeem(parseInt(t.dataset.redeem,10)); return; }
    if(t.dataset.tier){ upgradeTier(t.dataset.tier); return; }
    if(t.dataset.save){ var id=parseInt(t.dataset.save,10); var i=state.saved.indexOf(id); if(i>-1){state.saved.splice(i,1);track('product_unsaved',{id:id});}else{state.saved.push(id);track('product_saved',{id:id});} renderContent(); return; }
    if(t.dataset.cart){ addToCart(parseInt(t.dataset.cart,10)); return; }
    if(t.dataset.uncart){ removeFromCart(parseInt(t.dataset.uncart,10)); return; }
    var act=t.dataset.act;
    if(act==='scan') consentSheet();
    else if(act==='run') runScan();
    else if(act==='closeScan'){ if(activeScan) activeScan.cancel(); }
    else if(act==='scanSingle'){ if(activeScan) activeScan.single(); }
    else if(act==='closeConsent'){ var c=document.getElementById('consent'); if(c)c.remove(); }
    else if(act==='travel') travelSheet();
    else if(act==='closeTravel'){ var s=document.getElementById('travelSheet'); if(s)s.remove(); }
    else if(act==='closeBook'){ var b=document.getElementById('bookSheet'); if(b)b.remove(); }
    else if(act==='openChat') openChat();
    else if(act==='closeChat') closeChat();
    else if(act==='sendChat'){ var inp=document.getElementById('chatInput'); if(inp) sendChat(inp.value); }
    else if(act==='signIn'){ state.loggedIn=true; track('logged_in'); renderContent(); }
    else if(act==='signOut'){ state.loggedIn=false; track('logged_out'); renderContent(); }
    else if(act==='continueGuest'){ track('continue_guest'); go('home'); }
    else if(act==='addCard') toast('Payment management is available in the live app.');
    else if(act==='checkout') toast('Checkout is a demo — no payment is taken.');
    else if(act==='editProfile'){ state.editProfile=true; renderContent(); }
    else if(act==='cancelProfile'){ state.editProfile=false; renderContent(); }
    else if(act==='saveProfile'){ document.querySelectorAll('[data-pfield]').forEach(function(inp){ USER.member[inp.getAttribute('data-pfield')]=inp.value.trim(); }); state.editProfile=false; track('profile_saved'); renderContent(); toast('Personal details saved.'); }
    else if(act==='editBio'){ state.editBio=true; renderContent(); }
    else if(act==='cancelBio'){ state.editBio=false; renderContent(); }
    else if(act==='saveBio'){ document.querySelectorAll('[data-bfield]').forEach(function(inp){ USER.member.profile[inp.getAttribute('data-bfield')]=inp.value.trim(); }); state.editBio=false; track('bio_saved'); renderContent(); toast('Bio metrics saved.'); }
    else if(act==='customizeRituals'){ var src=state.ritualSaved[state.location]||DATA.ritualsByLocation[state.location]; state.ritualDraft=src.map(function(r){return {name:r.name,time:r.time,how:r.how,type:r.type};}); state.editRituals=true; state.ritualFilter='similar'; track('ritual_customize_open'); renderContent(); }
    else if(act==='cancelRituals'){ state.editRituals=false; state.ritualDraft=null; renderContent(); }
    else if(act==='saveRituals'){ state.ritualSaved[state.location]=state.ritualDraft; state.editRituals=false; state.ritualDraft=null; track('ritual_customized'); renderContent(); toast('Ritual updated.'); }
    else if(act==='joinSession') toast('Your secure video room opens at the scheduled time.');
    else if(act==='saveResults'){ DATA.bodyScan.areas.forEach(function(a){(a.products||[]).forEach(function(id){ if(state.saved.indexOf(id)<0) state.saved.push(id); });}); state.resultsSaved=true; track('results_saved'); renderContent(); toast('Results & product suggestions saved.'); }
    else if(act==='momReset'){ state.momFilter={continent:'all',country:'all',state:'all',type:'all',month:'all',year:'all'}; track('moments_filter_cleared'); renderContent(); }
    else if(act==='momSortReset'){ state.momSort={key:'none',dir:'asc'}; track('moments_sort_cleared'); renderContent(); }
    else if(act==='momPanelFilter'){ state.momPanel=state.momPanel==='filter'?'none':'filter'; renderContent(); }
    else if(act==='momPanelSort'){ state.momPanel=state.momPanel==='sort'?'none':'sort'; renderContent(); }
    else if(act==='momPanelClose'){ state.momPanel='none'; renderContent(); }
    else if(act==='carPrev'||act==='carNext'){ var tr=document.getElementById(t.dataset.track); if(tr){ var fc=tr.firstElementChild, step=fc?Math.round(fc.getBoundingClientRect().width+12):Math.round(tr.clientWidth*0.85); tr.scrollBy({left:(act==='carNext'?1:-1)*step,behavior:'smooth'}); } }
  });
  document.addEventListener('keydown', function(e){ if(e.key==='Enter' && e.target && e.target.id==='chatInput'){ sendChat(e.target.value); } });
  document.addEventListener('change', function(e){
    var fe=e.target.closest('[data-momfilter]');
    if(fe){ var k=fe.getAttribute('data-momfilter'); state.momFilter[k]=fe.value; if(k==='continent'){ state.momFilter.country='all'; state.momFilter.state='all'; } else if(k==='country'){ state.momFilter.state='all'; } track('moments_filtered',{key:k,value:fe.value}); renderContent(); return; }
    var se=e.target.closest('[data-momsort]');
    if(se){ var sk=se.getAttribute('data-momsort'); state.momSort[sk]=se.value; track('moments_sorted',{key:sk,value:se.value}); renderContent(); return; }
  });

  (function initEmbed(){
    try{ var q=new URLSearchParams(location.search);
      if(q.get('embed')){
        document.documentElement.classList.add('embed');
        var d=q.get('device'); if(d && DEVICES[d]) currentDevice=d;
        landscape=q.get('landscape')==='1';
      }
    }catch(e){}
  })();
  buildToolbar(); selectDevice(currentDevice); track('app_loaded',{view:state.view});
})();
</script>
